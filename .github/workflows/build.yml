name: Build Sol System (APK + EXE)

on:
  push:
    branches: [ main ]

jobs:

  android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Download Pre-built LÖVE APK
      run: |
        curl -L -o love.apk https://github.com/love2d/love-android/releases/download/11.5a/love-11.5-android-embed.apk

    - name: Inject game.love into APK
      run: |
        sudo apt-get install -y zip
        # The 'embed' version of the APK looks for the game at assets/game.love
        zip -j -7 love.apk game.love

    - name: Align and Sign APK (Debug)
      run: |
        # This makes the APK installable for testing
        mv love.apk SolSystem-debug.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Sol-System-APK
        path: SolSystem-debug.apk
        

  windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Download LÖVE
      run: |
        curl -L -o love.zip https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip
        # Fixed: Added DestinationPath so it doesn't nest inside an extra folder
        powershell -Command "Expand-Archive love.zip -DestinationPath ."

    - name: Build EXE
      shell: cmd
      run: |
        copy /b love-11.5-win64\love.exe+game.love SolSystem.exe

    - name: Prepare folder
      shell: cmd
      run: |
        mkdir dist
        move SolSystem.exe dist
        copy love-11.5-win64\*.dll dist

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Sol-System-Windows
        path: dist/
