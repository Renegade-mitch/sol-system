name: Build Sol System (APK + EXE)

on:
  push:
    branches: [ "main" ]

jobs:
  # --- WINDOWS BUILD ---
  windows:
    runs-on: windows-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Download LÖVE
      run: |
        curl -L https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip -o love.zip
        Expand-Archive love.zip -DestinationPath .

    - name: Build EXE
      run: |
        # This combines your game.love with the love.exe
        # Ensure 'game.love' exists in your root folder
        copy /b love-11.5-win64\love.exe+game.love SolSystem.exe
        
        # Copy necessary DLLs for the game to run
        mkdir build
        move SolSystem.exe build/
        copy love-11.5-win64\*.dll build/
        copy love-11.5-win64\license.txt build/

    - name: Upload Windows Build
      uses: actions/upload-artifact@v4
      with:
        name: Sol-System-Windows
        path: build/

  # --- ANDROID BUILD ---
  android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Build Standalone Android APK
      # Using this action avoids the manual 'sed' and 'CMake' errors
      uses: love-actions/love-actions-android@v2
      with:
        app-name: "Sol System"
        bundle-id: "com.renegademitch.solsystem"
        # Point this exactly to your .love file
        love-package: "game.love"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Sol-System-Android-APK
        path: "*.apk"
