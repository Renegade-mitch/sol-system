name: Build Sol System (APK + EXE)

on:
  push:
    branches: [ main ]

jobs:

  android:
    # We stay on 22.04 to ensure the CMake version is compatible
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout your repo
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Clone love-android source
      uses: actions/checkout@v4
      with:
        repository: love2d/love-android
        path: love-android-src
        ref: main

    - name: Prepare game files
      run: |
        mkdir -p love-android-src/app/src/main/assets
        cp game.love love-android-src/app/src/main/assets/

    - name: Configure App Identity
      run: |
        # Change the internal ID so it's a separate app
        sed -i 's/org.love2d.android/com.renegademitch.solsystem/g' love-android-src/app/build.gradle
        
        # Change the App Name
        # We search for strings.xml and replace the default title
        find love-android-src -name "strings.xml" -exec sed -i 's/LÖVE for Android/Sol System/g' {} +

    - name: Build APK
      run: |
        cd love-android-src
        chmod +x gradlew
        # We removed the manual ndk.dir setting to avoid the previous error
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Sol-System-APK-Standalone
        path: love-android-src/app/build/outputs/apk/debug/*.apk
        

  windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Download LÖVE
      run: |
        curl -L -o love.zip https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip
        # Fixed: Added DestinationPath so it doesn't nest inside an extra folder
        powershell -Command "Expand-Archive love.zip -DestinationPath ."

    - name: Build EXE
      shell: cmd
      run: |
        copy /b love-11.5-win64\love.exe+game.love SolSystem.exe

    - name: Prepare folder
      shell: cmd
      run: |
        mkdir dist
        move SolSystem.exe dist
        copy love-11.5-win64\*.dll dist

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Sol-System-Windows
        path: dist/
