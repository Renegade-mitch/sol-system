name: Build Sol System (APK + EXE)

on:
  push:
    branches: [ main ]

jobs:

  android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Clone love-android
      run: git clone https://github.com/love2d/love-android.git

    - name: Prepare game
      run: |
        mkdir -p love-android/app/src/main/assets
        cp game.love love-android/app/src/main/assets/

    # The 'Rename app' step was removed here because love-android changed their file structure
    # and strings.xml is no longer at the old path, which was causing the crash.

    - name: Build APK
      run: |
        cd love-android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Sol-System-APK
        path: love-android/app/build/outputs/apk/debug/*.apk


  windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Download LÖVE
      run: |
        curl -L -o love.zip https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip
        # Fixed: Added DestinationPath so it doesn't nest inside an extra folder
        powershell -Command "Expand-Archive love.zip -DestinationPath ."

    - name: Build EXE
      shell: cmd
      run: |
        copy /b love-11.5-win64\love.exe+game.love SolSystem.exe

    - name: Prepare folder
      shell: cmd
      run: |
        mkdir dist
        move SolSystem.exe dist
        copy love-11.5-win64\*.dll dist

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Sol-System-Windows
        path: dist/
