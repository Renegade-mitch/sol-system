name: Build Sol System (APK + EXE)

on:
  push:
    branches: [ main ]

jobs:

  android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repo
      uses: actions/checkout@v4

    - name: Build Standalone Android APK
      # This action handles all the CMake and NDK settings for you
      uses: love-actions/love-actions-android@v2
      with:
        app-name: "Sol System"
        bundle-id: "com.renegademitch.solsystem"
        love-package: "game.love"
        # Optional: you can set a version string
        version-string: "1.0.0"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Sol-System-Android-APK
        # The action will output the APK directly to your workspace
        path: "*.apk"
  

  windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Download LÖVE
      run: |
        curl -L -o love.zip https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip
        # Fixed: Added DestinationPath so it doesn't nest inside an extra folder
        powershell -Command "Expand-Archive love.zip -DestinationPath ."

    - name: Build EXE
      shell: cmd
      run: |
        copy /b love-11.5-win64\love.exe+game.love SolSystem.exe

    - name: Prepare folder
      shell: cmd
      run: |
        mkdir dist
        move SolSystem.exe dist
        copy love-11.5-win64\*.dll dist

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Sol-System-Windows
        path: dist/
