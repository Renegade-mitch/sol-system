name: Build Sol System (APK + EXE)

on:
  push:
    branches: [ "main" ]

jobs:
  # --- WINDOWS BUILD ---
  windows:
    runs-on: windows-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Download LÖVE
      run: |
        curl -L https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip -o love.zip
        Expand-Archive love.zip -DestinationPath .

    - name: Build EXE
      # EXPLICITLY USE CMD, NOT POWERSHELL
      shell: cmd
      run: |
        copy /b love-11.5-win64\love.exe+game.love SolSystem.exe
        mkdir build
        move SolSystem.exe build\
        copy love-11.5-win64\*.dll build\
        copy love-11.5-win64\license.txt build\

    - name: Upload Windows Build
      uses: actions/upload-artifact@v4
      with:
        name: Sol-System-Windows
        path: build/

  # --- ANDROID BUILD ---
  android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Clone love-android source
      uses: actions/checkout@v4
      with:
        repository: love2d/love-android
        path: love-android-src
        # CRITICAL FIX: This pulls in the actual LÖVE C++ engine code 
        # so CMake doesn't crash with an "Exit value 1"
        submodules: recursive 

    - name: Prepare game files
      run: |
        # Put game.love in the correct "embed" folder for modern LÖVE Android builds
        mkdir -p love-android-src/app/src/embed/assets
        cp game.love love-android-src/app/src/embed/assets/

    - name: Configure App Identity
      run: |
        # Change the internal ID so your phone installs it as a standalone app
        sed -i 's/org.love2d.android/com.renegademitch.solsystem/g' love-android-src/app/build.gradle
        
        # Change the App Name to "Sol System"
        find love-android-src -name "strings.xml" -exec sed -i 's/LÖVE for Android/Sol System/g' {} +

    - name: Build APK
      run: |
        cd love-android-src
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Sol-System-Android-APK
        path: love-android-src/app/build/outputs/apk/debug/*.apk
