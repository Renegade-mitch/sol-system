name: Build Sol System (APK + EXE)

on:
  push:
    branches: [ "main" ]

jobs:
  # --- WINDOWS BUILD ---
  windows:
    runs-on: windows-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Download LÖVE
      run: |
        curl -L https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip -o love.zip
        Expand-Archive love.zip -DestinationPath .

    - name: Build EXE
      # EXPLICITLY USE CMD, NOT POWERSHELL
      shell: cmd
      run: |
        copy /b love-11.5-win64\love.exe+game.love SolSystem.exe
        mkdir build
        move SolSystem.exe build\
        copy love-11.5-win64\*.dll build\
        copy love-11.5-win64\license.txt build\

    - name: Upload Windows Build
      uses: actions/upload-artifact@v4
      with:
        name: Sol-System-Windows
        path: build/




  # --- ANDROID BUILD ---
  android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Clone love-android source
      run: |
        git clone --branch 11.5a --recurse-submodules https://github.com/love2d/love-android love-android-src

    - name: Debug icon
      run: |
        find love-android-src -name "love.png" 2>/dev/null
        find love-android-src -name "*.png" | head -20
        
    - name: Prepare game files
      run: |
        mkdir -p love-android-src/app/src/embed/assets
        cp game.love love-android-src/app/src/embed/assets/

    
    - name: Configure App Identity
      run: |
        # 1. Change the Application ID (How the phone identifies the app - NO manifest patching needed!)
        sed -i 's/app.application_id=org.love2d.android/app.application_id=com.renegademitch.solsystem/g' love-android-src/gradle.properties

        # 2. Change the App Name shown on the phone's home screen
        mkdir -p love-android-src/app/src/main/res/values
        printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <string name="app_name">Sol System</string>\n</resources>\n' > love-android-src/app/src/main/res/values/strings.xml
        find love-android-src -name "AndroidManifest.xml" -exec sed -i 's/android:label="[^"]*"/android:label="@string\/app_name"/g' {} \;
        find love-android-src -name "AndroidManifest.xml" -exec sed -i 's/android:screenOrientation="[^"]*"/android:screenOrientation="portrait"/g' {} \;

    - name: Set App Icon
      run: |
        sudo apt-get install -y imagemagick
        mkdir -p love-android-src/app/src/main/res/drawable
        convert icon.png -resize 192x192 love-android-src/app/src/main/res/drawable/love.png
    
    - name: Build APK
      run: |
        cd love-android-src
        chmod +x gradlew
        # Explicitly build ONLY the embedded version so there are no confusing extra APKs
        ./gradlew assembleEmbedNoRecordDebug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Sol-System-Android-APK
        path: love-android-src/app/build/outputs/apk/**/*.apk

# --- CREATE RELEASE ---
  release:
    runs-on: ubuntu-latest
    needs: [windows, android]
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: Sol System Build ${{ github.run_number }}
        files: |
          Sol-System-Windows/**
          Sol-System-Android-APK/**
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN}}
