name: Build Sol System (APK + EXE)

on:
  push:
    branches: [ main ]

jobs:

  # =========================
  # ANDROID APK BUILD
  # =========================
  android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Clone love-android
      run: git clone https://github.com/love2d/love-android.git

    - name: Prepare game
      run: |
        rm -rf love-android/app/src/main/assets/*
        cp game.love love-android/app/src/main/assets/

    - name: Rename app
      run: |
        sed -i 's/LÖVE for Android/Sol System/g' love-android/app/src/main/res/values/strings.xml

    - name: Build APK
      run: |
        cd love-android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Sol-System-APK
        path: love-android/app/build/outputs/apk/debug/*.apk


  # =========================
  # WINDOWS EXE BUILD
  # =========================
  windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Download LÖVE
      run: |
        curl -L -o love.zip https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip
        powershell -Command "Expand-Archive love.zip"

    - name: Create EXE
      run: |
        copy /b love-11.5-win64\love.exe+game.love SolSystem.exe

    - name: Package files
      run: |
        mkdir dist
        copy SolSystem.exe dist\
        copy love-11.5-win64\*.dll dist\

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Sol-System-Windows
        path: dist/
